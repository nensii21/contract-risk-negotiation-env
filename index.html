<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contract Risk Negotiation Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <header class="header">
      <div class="header-icon">⚖️</div>
      <h1>Contract Risk Negotiation Tool</h1>
      <p class="subtitle">AI-powered contract risk analysis environment</p>
    </header>

    <main>
      <section class="card">
<h2 class="section-title">Configure Request</h2>

        <div class="field-group">
          <label for="base-url">Base URL</label>
          <input type="url" id="base-url" value="http://127.0.0.1:7860/" placeholder="http://127.0.0.1:7860/">
        </div>

        <div class="field-group">
          <label for="endpoint-select">Endpoint</label>
<select id="endpoint-select">
            <option value="GET /list_tasks">GET /list_tasks — List all tasks</option>
            <option value="GET /state">GET /state — Current environment state</option>
            <option value="POST /step">POST /step — Take a step (JSON body required)</option>
          </select>
        </div>



        <div class="field-group" id="body-group" style="display:none">
          <label for="body-input">Request Body (JSON)</label>
          <textarea
            id="body-input"
            rows="5"
            placeholder='{"action_type": "identify_risk", "content": "unlimited liability"}'
          ></textarea>
          <div class="body-presets">
            <span class="preset-label">Quick fill:</span>
            <button class="preset-btn" data-value='{"action_type":"identify_risk","content":"unlimited liability"}'>identify_risk</button>
            <button class="preset-btn" data-value='{"action_type":"classify_risk_type","content":"financial"}'>classify_risk_type</button>
            <button class="preset-btn" data-value='{"action_type":"propose_fix","content":"Limit scope and allow parties to terminate with 30 days notice"}'>propose_fix</button>
            <button class="preset-btn" data-value='{"action_type":"send_reply","content":"Please review, we suggest and recommend revisions to the clause"}'>send_reply</button>
          </div>
        </div>

        <button id="run-btn" class="run-btn">
          <span id="btn-text">Run</span>
          <span id="btn-loader" class="btn-loader" style="display:none">
            <span class="spinner"></span> Sending…
          </span>
        </button>
      </section>

      <section class="card" id="output-card" style="display:none">
        <div class="output-header">
          <h2 class="section-title">Response</h2>
          <div class="output-meta">
            <span id="status-badge" class="badge"></span>
            <span id="response-time" class="response-time"></span>
            <button class="copy-btn" id="copy-btn" title="Copy JSON">Copy</button>
          </div>
        </div>
        <div id="output-box" class="output-box"></div>
      </section>
    </main>

    <footer class="footer">
      OpenEnv · contract-risk-negotiation-env · FastAPI + Pydantic v2
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
